<!DOCTYPE html>
<head>
    <title>AI Service Configuration</title>
    <link rel="stylesheet" href="css/axconfig.css?v=1.0.2" />
</head>
<body>
    <div class="axconfig-config-container">
        <div class="config-tabs">
            <div class="tab active lang" data-tab="basic" as="axconfig.tab.basic"></div>
            <div class="tab lang" data-tab="model" as="axconfig.tab.model"></div>
            <div class="tab lang" data-tab="prompt" as="axconfig.tab.prompt"></div>
            <div class="tab lang" data-tab="knowledge" as="axconfig.tab.knowledge" style="display: none;"></div>
            <!-- Advanced Setting tab hidden for next version -->
            <!-- <div class="tab lang" data-tab="advanced" as="axconfig.tab.advanced"></div> -->
        </div>

        <div class="tab-content">
            <!-- Hidden fields for JavaScript access (previously in Basic Property tab) -->
            <input type="hidden" id="activity-name">
            <input type="hidden" id="config-uuid">

            <!-- Basic Property -->
            <div class="tab-pane active" id="basic-tab">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.service.type"></span></label>
                        <input type="text" id="service-type" class="form-control form-control-readonly" readonly>
                    </div>
                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.description"></span></label>
                        <textarea id="axconfig-description" style="min-height: 150px;" placeholder=""></textarea>
                    </div>
                </div>
            </div>

            <!-- 模型配置 -->
            <div class="tab-pane" id="model-tab">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.model"></span> <span class="required">*</span></label>
                        <select id="model-select" class="form-control" style="height: 40px;">
                            <option value="">-- <span class="lang" as="selectplaceholder"></span> --</option>
                        </select>
                        <small class="form-text text-muted"><span class="lang" as="axconfig.model.hint"></span></small>
                    </div>

                    <div class="form-group half-width">
                        <label><span class="lang" as="axconfig.temperature"></span></label>
                        <div class="slider-container">
                            <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.3">
                            <span class="slider-value">0.3</span>
                        </div>
                    </div>

                    <div class="form-group half-width">
                        <label><span class="lang" as="axconfig.max.tokens"></span></label>
                        <input type="number" id="max-tokens" value="4096" placeholder="">
                    </div>

                    <div class="form-group half-width">
                        <label><span class="lang" as="axconfig.memory.turns"></span></label>
                        <input type="number" id="memory-turns" min="1" max="50" value="10" placeholder="8">
                        <small class="form-text text-muted"><span class="lang" as="axconfig.memory.turns.hint"></span></small>
                    </div>

                    <div class="form-group half-width">
                        <label><span class="lang" as="axconfig.response.format"></span></label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="json" name="format" value="json" checked>
                                <label for="json">JSON</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="text" name="format" value="text">
                                <label for="text"><span class="lang" as="axconfig.format.text"></span></label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="xml" name="format" value="xml">
                                <label for="xml">XML</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="markdown" name="format" value="markdown">
                                <label for="markdown">Markdown</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 提示词设置 -->
            <div class="tab-pane" id="prompt-tab">
                <div class="form-group">
                    <label><span class="lang" as="axconfig.system.prompt"></span> <span class="required">*</span></label>
                    <textarea id="system-prompt" style="min-height: 180px;" placeholder=""></textarea>
                    <div class="form-note"><span class="lang" as="axconfig.system.prompt.note"></span></div>
                </div>

                <div class="form-group">
                    <label><span class="lang" as="axconfig.user.message"></span></label>
                    <textarea id="user-message-prompt" placeholder=""></textarea>
                    <div class="form-note"><span class="lang" as="axconfig.user.message.note"></span></div>
                </div>
            </div>

            <!-- Knowledge Base -->
            <div class="tab-pane" id="knowledge-tab">
                <div class="config-section">
                    <div class="section-header">
                        <h3 class="lang" as="axconfig.knowledge.embedding.section"></h3>
                    </div>
                    <div class="form-grid">
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.embedding.model"></span></label>
                            <select id="knowledge-embedding-model" class="form-control">
                                <option value="">-- <span class="lang" as="selectplaceholder"></span> --</option>
                            </select>
                            <div class="form-note"><span class="lang" as="axconfig.knowledge.embedding.model.note"></span></div>
                        </div>
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.embedding.dimensions"></span></label>
                            <input type="number" id="knowledge-embedding-dimensions" class="form-control" value="1536" min="128" max="4096" placeholder="1536">
                            <div class="form-note"><span class="lang" as="axconfig.knowledge.embedding.dimensions.note"></span></div>
                        </div>
                    </div>
                    <div class="section-header">
                        <h3 class="lang" as="axconfig.knowledge.search.strategy"></h3>
                    </div>
                    <div class="form-grid">
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.search.strategy"></span></label>
                            <select id="knowledge-search-strategy" class="form-control" disabled>
                                <option value="similarity" selected data-lang="axconfig.knowledge.search.strategy.similarity">相似度检索</option>
                                <option value="hybrid" data-lang="axconfig.knowledge.search.strategy.hybrid">混合检索</option>
                                <option value="rerank" data-lang="axconfig.knowledge.search.strategy.rerank">重排序检索</option>
                            </select>
                        </div>
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.search.count"></span></label>
                            <input type="number" id="knowledge-search-count" class="form-control" value="3" min="1" max="10">
                            <div class="form-note"><span class="lang" as="axconfig.knowledge.search.count.note"></span></div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.similarity.threshold"></span></label>
                            <div class="slider-container">
                                <input type="range" id="similarity-threshold" min="0" max="1" step="0.05" value="0.7">
                                <span class="slider-value" id="similarity-value">0.70</span>
                            </div>
                            <div class="form-note"><span class="lang" as="axconfig.knowledge.similarity.threshold.note"></span></div>
                        </div>
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.search.mode"></span></label>
                            <div class="checkbox-group">
                                <label class="checkbox-item">
                                    <input type="checkbox" id="search-mode-semantic" checked>
                                    <span class="lang" as="axconfig.knowledge.search.mode.semantic"></span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="search-mode-keyword" checked>
                                    <span class="lang" as="axconfig.knowledge.search.mode.keyword"></span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="search-mode-metadata">
                                    <span class="lang" as="axconfig.knowledge.search.mode.metadata"></span>
                                </label>
                            </div>
                </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group half-width">
                            <label><span class="lang" as="axconfig.knowledge.function.name"></span></label>
                            <input type="text" id="knowledge-function-name" class="form-control" placeholder="">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 高级设置 -->
            <div class="tab-pane" id="advanced-tab">
                <div class="form-grid">
                    <div class="form-group half-width">
                        <label><span class="lang" as="axconfig.timeout"></span></label>
                        <input type="number" id="timeout" value="60" placeholder="">
                    </div>

                    <div class="form-group half-width">
                        <label><span class="lang" as="axconfig.max.retries"></span></label>
                        <input type="number" id="max-retries" value="3" placeholder="">
                    </div>

                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.error.handling"></span></label>
                        <select id="error-handling">
                            <option value="abort" data-lang="axconfig.error.handling.abort">中止流程</option>
                            <option value="retry" selected data-lang="axconfig.error.handling.retry">自动重试</option>
                            <option value="fallback" data-lang="axconfig.error.handling.fallback">使用备选智能体</option>
                            <option value="ignore" data-lang="axconfig.error.handling.ignore">忽略错误继续</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.fallback.agent"></span></label>
                        <input type="text" id="fallback-agent" placeholder="">
                    </div>

                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.log.level"></span></label>
                        <select id="log-level">
                            <option value="debug" data-lang="axconfig.log.level.debug">调试</option>
                            <option value="info" data-lang="axconfig.log.level.info">信息</option>
                            <option value="warn" selected data-lang="axconfig.log.level.warn">警告</option>
                            <option value="error" data-lang="axconfig.log.level.error">错误</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label><span class="lang" as="axconfig.custom.instructions"></span></label>
                        <textarea id="custom-instructions" placeholder=""></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="notification" id="notification"></div>

        <div class="form-footer">
            <button class="btn btn-secondary lang" data-dismiss="modal" aria-hidden="true" as="cancel"></button>
            <button class="btn btn-primary" id="save-btn">
                <i class="fas fa-save"></i>
                <span class="lang" as="save"></span>
            </button>
        </div>
    </div>
    <script type="text/javascript">
        $(function () {
            kresource.localize();
            axconfig.init();
        });
    </script>
</body>
</html>
