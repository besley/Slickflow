<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Field List</title>
    <!-- AG Grid v33: theme applied via grid option theme: themeBalham - do not include ag-grid.css or legacy theme CSS -->
    <style type="text/css">
        .field-permissions-body {
            padding: 4px 0;
            min-width: 420px;
        }
        .field-permissions-form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .field-permissions-form-row .a_tit {
            flex-shrink: 0;
            width: 72px;
            font-weight: 500;
        }
        .field-permissions-form-row #ddlFormList {
            flex: 1;
            min-width: 0;
            max-width: 100%;
            height: 34px;
        }
        .field-permissions-grid-wrap {
            width: 100%;
            height: 320px;
        }
        #myFieldActivityEditGrid.ag-theme-balham {
            width: 100%;
            height: 320px;
        }
        .field-permissions-body .ag-header-cell {
            background-color: #49afcd;
        }
        .field-permissions-body .ag-row-selected {
            background-color: #bde2e5;
        }
    </style>
</head>
<body>
    <!-- Modal -->
    <div class="modal-body field-permissions-body">
        <div class="field-permissions-form-row">
            <span class="a_tit lang" as="formlist"></span>
            <select id="ddlFormList" class="form-control">
            </select>
        </div>
        <div class="field-permissions-grid-wrap">
            <div id="myFieldActivityEditGrid" class="ag-theme-balham" style="width:100%;height:320px;"></div>
        </div>
    </div>
    <div class="modal-footer">
        <button class="btn btn-primary lang" as="sure" data-dismiss="modal" onclick="fieldlist.save();"></button>
        <button class="btn lang" as="cancel" data-dismiss="modal" aria-hidden="true"></button>
    </div>

    <script type="text/javascript">
        $(function () {
            kresource.localize();
            fieldlist.init();
        })
    </script>
</body>
</html>
